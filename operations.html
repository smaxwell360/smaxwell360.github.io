<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Operations Experience — Scott Maxwell</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { 
      box-sizing: border-box; 
      margin: 0; 
      padding: 0; 
    }
    
    :root {
      --ink: #1a1a18;
      --ink-muted: #6b6b62;
      --ink-faint: #a8a89e;
      --surface: #faf9f6;
      --surface-raised: #ffffff;
      --border: #e4e2da;
      --border-strong: #c8c5bb;
      --teal-bg: #e1f5ee;
      --teal-mid: #1d9e75;
      --teal-dark: #085041;
      --blue-bg: #e6f1fb;
      --blue-mid: #185fa5;
      --blue-dark: #0c447c;
      --purple-bg: #eeedfe;
      --purple-mid: #534ab7;
      --purple-dark: #3c3489;
      --font-display: 'DM Serif Display', Georgia, serif;
      --font-body: 'DM Sans', system-ui, sans-serif;
      --radius-sm: 6px;
      --radius-md: 10px;
      --radius-lg: 16px;
    }

    body {
      font-family: var(--font-body);
      background: var(--surface);
      color: var(--ink);
      line-height: 1.6;
      padding: 0 1.5rem 5rem; /* Removed top padding to let header rest flush at top */
      font-size: 16px;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Site Navigation Header ── */
    .site-header {
      width: 100%;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 1000;
      margin-bottom: 3rem;
    }

    .header-container {
      max-width: 820px;
      margin: 0 auto;
      padding: 1.75rem 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo a {
      font-family: var(--font-display);
      font-size: 1.25rem;
      color: var(--ink);
      text-decoration: none;
    }

    .main-nav ul {
      list-style: none;
      display: flex;
      gap: 2rem;
    }

    .main-nav a {
      font-family: var(--font-body);
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--ink-muted);
      text-decoration: none;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      transition: color 0.2s ease;
      padding-bottom: 4px;
    }

    .main-nav a:hover,
    .main-nav a.active {
      color: var(--ink);
      border-bottom: 2px solid var(--ink);
    }

    /* ── Page Layout ── */
    .section-wrapper {
      max-width: 820px;
      margin: 0 auto;
    }

    .section-header {
      margin-bottom: 3rem;
      border-bottom: 1px solid var(--border);
      padding-bottom: 1.5rem;
    }

    .section-eyebrow {
      font-family: var(--font-body);
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--ink-faint);
      margin-bottom: 0.6rem;
    }

    .section-title {
      font-family: var(--font-display);
      font-size: clamp(2rem, 4vw, 2.8rem);
      line-height: 1.15;
      color: var(--ink);
      font-weight: 400;
    }

    .section-title em {
      font-style: italic;
      color: var(--ink-muted);
    }

    .section-desc {
      margin-top: 0.85rem;
      font-size: 15px;
      color: var(--ink-muted);
      font-weight: 300;
      max-width: 560px;
      line-height: 1.7;
    }

    /* ── Cards ── */
    .story-card {
      background: var(--surface-raised);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 2rem 2.25rem;
      margin-bottom: 1.75rem;
      position: relative;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    .story-card:hover {
      border-color: var(--border-strong);
      box-shadow: 0 4px 24px rgba(0,0,0,0.05);
    }

    .card-accent {
      position: absolute;
      top: 0;
      left: 0;
      width: 4px;
      height: 100%;
      border-radius: var(--radius-lg) 0 0 var(--radius-lg);
    }

    .accent-teal   { background: var(--teal-mid); }
    .accent-blue   { background: var(--blue-mid); }
    .accent-purple { background: var(--purple-mid); }

    .card-inner { padding-left: 0.5rem; }

    /* header row */
    .card-header {
      display: flex;
      align-items: flex-start;
      gap: 1rem;
      margin-bottom: 1.25rem;
    }

    .card-icon {
      width: 44px;
      height: 44px;
      border-radius: var(--radius-md);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 18px;
    }

    .icon-teal   { background: var(--teal-bg);   color: var(--teal-dark); }
    .icon-blue   { background: var(--blue-bg);   color: var(--blue-dark); }
    .icon-purple { background: var(--purple-bg); color: var(--purple-dark); }

    .card-meta { flex: 1; }

    .card-company {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--ink-faint);
      margin-bottom: 3px;
    }

    .card-title {
      font-family: var(--font-display);
      font-size: 1.2rem;
      font-weight: 400;
      line-height: 1.3;
      color: var(--ink);
    }

    /* tags */
    .tag-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 1.25rem;
